<!doctype html>
<html lang=""  xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách Đĩa Game</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
    <h1 class="text-center">
        Cửa hàng Đĩa Game Rikkei
    </h1>
    <div class="container">
        <h2>Danh sách Đĩa Game </h2>
        <div style="display: flex; flex-direction: row;justify-content: space-between;">
            <form>
                <div class="form-group">
                    <input type="text" class="key" placeholder="Search ... ">
                    <button type="submit">Search</button>
                </div>
            </form>
            <a href="/gameDisk/form" style="border: 1px solid black; padding: 3px; height: 35px ">Add</a>
        </div>
        <table class="table table-striped table-bordered">
            <tr>
                <th>Id</th>
                <th>Title</th>
                <th>Genre</th>
                <th>Quantity</th>
                <th>Image</th>
                <th>Action</th>
            </tr>
            <tr th:each="game : ${gameDisks}">
                <td th:text="${game.id}"></td>
                <td th:text="${game.title}"></td>
                <td th:text="${game.genre}"></td>
                <td th:text="${game.quantity}"></td>
                <td><img src="@{game.coverImage}" alt="No Image"></td>
                <td>
                    <a th:href="@{/gameDisk/edit/{id}(id=${game.id})}" class="btn btn-primary">Sửa</a>
                    <a th:href="@{/gameDisk/delete/{id}(id=${game.id})}" class="btn btn-danger" onclick="return confirm('Có xác nhận xóa hay không?')">Xóa</a>
                </td>

            </tr>
        </table>
    </div>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
